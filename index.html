<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollution.ai - Vercel Pro Edition</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: sans-serif; background-color: #111; height: 100%; display: flex; flex-direction: column; }
        
        #loginScreen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #fff; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 350px; }
        .btn-login { background-color: #0096FF; color: white; border: none; padding: 12px 20px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        
        /* 🚀 Vercel Pro ব্যাকগ্রাউন্ড */
        #chatScreen { 
            display: none; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; width: 100%; 
            background-color: #87CEEB !important; 
            background-image: url('https://assets.vercel.com/image/upload/v1538361091/repositories/next-js/next-js-bg.png') !important;
            background-size: cover !important;
            background-position: center !important;
        }
        
        .header { padding: 15px; background: rgba(0, 150, 255, 0.9); color: white; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { margin: 0; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .header button { background: white; color: #0096FF; padding: 5px 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; margin-left: 5px;}
        .header .clear-btn { color: red; }
        
        /* চ্যাট কন্টেইনার */
        .chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: rgba(255,255,255,0.3); backdrop-filter: blur(2px); }
        
        /* 🔴 Dark Mode ফিক্স: !important দিয়ে রঙ ফিক্স করা হয়েছে */
        .message { max-width: 85%; padding: 12px 18px; border-radius: 15px; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .user-message { background-color: #0096FF !important; color: #ffffff !important; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-message { background-color: #ffffff !important; color: #000000 !important; align-self: flex-start; border-bottom-left-radius: 2px; font-weight: bold; }
        
        .input-area { padding: 15px; background: rgba(0, 0, 0, 0.7); display: flex; gap: 10px; align-items: center;}
        
        /* মাইক বাটন */
        .mic-btn { background: transparent !important; border: none; font-size: 22px; cursor: pointer; padding: 0; margin-right: 5px; }
        
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; background: #ffffff !important; color: #000 !important; font-size: 14px; font-weight: bold; }
        .input-area .send-btn { background: #0096FF; color: white; padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; font-size: 14px;}
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; text-align: center; color: black; }
        .modal-content button { background: #d93025; color: white; padding: 10px 20px; border: none; border-radius: 10px; margin-top: 15px; cursor: pointer;}
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-box">
            <h2>Pollution.ai</h2>
            <input type="email" id="emailInput" placeholder="ইমেইল দিন (ex: abc@gmail.com)"><br><br>
            <input type="password" id="password" placeholder="পাসওয়ার্ড (অন্তত ৬ অক্ষর)"><br><br>
            <button class="btn-login" onclick="window.loginAccount()">Login / Join</button>
        </div>
    </div>
    <div id="chatScreen">
        <div class="header">
            <h3>Doraemon AI ⚡</h3>
            <div>
                <button onclick="window.showQRCode()">QR</button>
                <button onclick="window.shareRoom()">Link</button>
                <button class="clear-btn" onclick="window.clearMemory()">Clear</button>
                <button onclick="window.logout()">Logout</button>
            </div>
        </div>
        <div class="chat-container" id="chatBox"></div>
        <div class="input-area">
            <button class="mic-btn" onclick="window.startVoice()" title="ভয়েস টাইপিং">🎤</button>
            <input type="text" id="prompt" placeholder="Message or use: qr, img, room ...">
            <button class="send-btn" onclick="window.askAI()">Send</button>
        </div>
    </div>
    <div id="qrModal" class="modal">
        <div class="modal-content">
            <h3>Share Room</h3>
            <img id="qrImage">
            <br>
            <button onclick="window.closeQRCode()">Close</button>
        </div>
            </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const app = initializeApp({ apiKey: "AIzaSyCJwqFqA_9Ebf0XpLQiiY8pV522YNOuUj0", authDomain: "chat-fb2b2.firebaseapp.com", projectId: "chat-fb2b2", storageBucket: "chat-fb2b2.firebasestorage.app", messagingSenderId: "417720476992", appId: "1:417720476992:web:974473397083942d9d86a5" });
        const db = getFirestore(app); const auth = getAuth(app); 

        let currentUserEmail = "";
        let conversationHistory = [];
        let unsubscribe = null; 
        
        // 🔒 Smart Lock: ডাবল রিকোয়েস্ট বন্ধ করার জন্য
        let isFetchingAI = false; 

        const urlParams = new URLSearchParams(window.location.search);
        const sharedRoomId = urlParams.get('room');
        const collectionName = sharedRoomId ? "shared_rooms" : "users";

        window.loginAccount = async () => {
            const email = document.getElementById('emailInput').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("ইমেইল ও পাসওয়ার্ড দিন!");
            try { 
                await signInWithEmailAndPassword(auth, email, pass); 
            } catch(e) { 
                try {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("নতুন অ্যাকাউন্ট তৈরি হয়েছে!");
                } catch(err) {
                    alert("ভুল ইমেইল বা পাসওয়ার্ড!"); 
                }
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserEmail = user.email;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'flex';
                
                const docId = sharedRoomId ? sharedRoomId : currentUserEmail;
                if(unsubscribe) unsubscribe();
                unsubscribe = onSnapshot(doc(db, collectionName, docId), (snap) => {
                    if(snap.exists()) {
                        conversationHistory = snap.data().chatHistory || [];
                        renderChats();
                    } else {
                        setDoc(doc(db, collectionName, docId), { chatHistory: [] });
                    }
                });
            }
        });

        // === Voice Recognition ===
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'bn-IN';
            recognition.interimResults = false;
            recognition.onresult = function(event) {
                document.getElementById('prompt').value = event.results[0][0].transcript;
                window.askAI(); 
            };
        }
        window.startVoice = function() { 
            if (recognition) recognition.start(); 
            else alert("আপনার ব্রাউজার ভয়েস টাইপিং সাপোর্ট করে না।"); 
        };
        
        function speakAI(text) {
            const cleanText = text.replace(/[\*\#\_]/g, ""); 
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'bn-IN';
            window.speechSynthesis.speak(utterance);
        }

        // === AI Core & Commands ===
        window.askAI = async () => {
            if (isFetchingAI) return; // 🔒 যদি আগের মেসেজ প্রসেস হয়, তবে ব্লক করবে
            
            const input = document.getElementById("prompt");
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            const docId = sharedRoomId ? sharedRoomId : currentUserEmail;

            // ১. 📸 QR Command
            if (text.toLowerCase().startsWith("qr ")) {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(text.substring(3))}&size=200x200`;
                conversationHistory.push({ role: 'user', content: text });
                conversationHistory.push({ role: 'assistant', content: `<img src="${qrUrl}" width="100%" style="border-radius:10px;">` });
                try { await updateDoc(doc(db, collectionName, docId), { chatHistory: conversationHistory }); } catch(e){}
                return;
            }

            // ২. 🎨 Image Command
            if (text.toLowerCase().startsWith("img ")) {
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text.substring(4))}?width=500&height=500&nologo=true`;
                conversationHistory.push({ role: 'user', content: text });
                conversationHistory.push({ role: 'assistant', content: `<img src="${imgUrl}" style="max-width:100%; border-radius:10px;">` });
                try { await updateDoc(doc(db, collectionName, docId), { chatHistory: conversationHistory }); } catch(e){}
                return;
            }

            // ৩. 🚪 Personal Room Command
            if (text.toLowerCase().startsWith("room ")) {
                const roomLink = window.location.origin + "/?room=" + text.substring(5).trim();
                conversationHistory.push({ role: 'user', content: text });
                conversationHistory.push({ role: 'assistant', content: `<b>আপনার প্রাইভেট রুম রেডি!</b><br><br><a href="${roomLink}" target="_blank" style="color:#0096FF; font-weight:bold;">👉 লিংকে ক্লিক করে জয়েন করুন</a><br><br><i>(এই রুমে AI রিপ্লাই দেবে না, শুধু আপনারা কথা বলতে পারবেন)</i>` });
                try { await updateDoc(doc(db, collectionName, docId), { chatHistory: conversationHistory }); } catch(e){}
                return;
            }

            // ৪. 🚀 Standard AI Chat
            isFetchingAI = true; // 🔒 সিস্টেম লক করা হলো
            conversationHistory.push({ role: 'user', content: text });
            try { await updateDoc(doc(db, collectionName, docId), { chatHistory: conversationHistory }); } catch(e){}
            
            // ⏳ ইউজারের মেসেজ দেখানোর পর 'Thinking' অ্যানিমেশন দেখানো
            renderChats(); 
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div id="thinking-bubble" class="message ai-message"><small style="opacity:0.7;"><b>Doraemon AI ⚡</b></small><br>ভাবছে... ⏳</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                let reply = "";
                try {
                    // ট্রিক ১: ডাইরেক্ট এপিআই
                    const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?model=mistral`);
                    reply = await res.text();
                    if (res.status === 429 || reply.includes('"error":') || reply.includes('Queue full') || reply.trim().startsWith("{")) throw new Error("limit");
                } catch(e) {
                    // ট্রিক ২: Proxy API (IP ব্লক বাইপাস করতে)
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://text.pollinations.ai/' + encodeURIComponent(text) + '?model=llama')}`;
                    const resProxy = await fetch(proxyUrl);
                    const data = await resProxy.json();
                    reply = data.contents;
                    if (!reply || reply.includes('"error":') || reply.includes('Queue full') || reply.trim().startsWith("{")) throw new Error("limit");
                }

                // উত্তর পেলে আসল উত্তর সেভ করা
                conversationHistory.push({ role: 'assistant', content: reply });
                try { await updateDoc(doc(db, collectionName, docId), { chatHistory: conversationHistory }); } catch(e){}
                speakAI(reply);
                
            } catch (e) {
                // সার্ভার ফেইল করলে মেসেজ ডিলিট করে ওয়ার্নিং দেখানো
                conversationHistory.pop();
                try { await updateDoc(doc(db, collectionName, docId), { chatHistory: conversationHistory }); } catch(err){}
                
                // রেন্ডার চ্যাট কল করে 'Thinking' মেসেজ সরিয়ে দেওয়া এবং এরর দেখানো
                renderChats(); 
                chatBox.innerHTML += `<div class="message ai-message"><small style="opacity:0.7;"><b>Doraemon AI ⚠️</b></small><br>উফফ! 😓 সার্ভার এখন একটু ব্যস্ত। দয়া করে ২ সেকেন্ড পর আবার ট্রাই করো।</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } finally {
                isFetchingAI = false; // 🔓 উত্তর আসার পর সিস্টেম আনলক করা হলো
            }
        };

        function renderChats() {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = '';
            conversationHistory.forEach(msg => {
                const sender = msg.role === 'user' ? 'You' : 'Doraemon AI';
                chatBox.innerHTML += `<div class="message ${msg.role}-message"><small style="opacity:0.7;"><b>${sender}</b></small><br>${msg.content}</div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.clearMemory = async () => {
            if(confirm("সব চ্যাট মুছে ফেলতে চান?")) {
                const docId = sharedRoomId ? sharedRoomId : currentUserEmail;
                await updateDoc(doc(db, collectionName, docId), { chatHistory: [] });
            }
        };

        window.showQRCode = () => { 
            let currentUrl = window.location.href;
            if(currentUrl.includes("file://") || currentUrl === "null") currentUrl = "https://pollution-ai.vercel.app";
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(currentUrl)}&size=200x200`; 
            document.getElementById('qrModal').style.display = 'flex'; 
        };
        
        window.closeQRCode = () => document.getElementById('qrModal').style.display = 'none';
        
        window.shareRoom = () => { 
            let currentUrl = window.location.href;
            if(currentUrl.includes("file://") || currentUrl === "null") currentUrl = "https://pollution-ai.vercel.app";
            navigator.clipboard.writeText(currentUrl); 
            alert("লিংক কপি হয়েছে!"); 
        };
        
        window.logout = () => { auth.signOut(); location.reload(); };

        // Enter press handler
        document.getElementById("prompt").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault(); // ডাবল সাবমিট বন্ধ করতে
                window.askAI();
            }
        });
    </script>
</body>
</html>
